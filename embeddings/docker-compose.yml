services:
  postgres:
    image: pgvector/pgvector:pg17
    container_name: openclip-pgvector
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-openclip}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-openclip}
      POSTGRES_DB: ${POSTGRES_DB:-openclip}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - ./pgdata:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-openclip} -d ${POSTGRES_DB:-openclip}"]
      interval: 5s
      timeout: 5s
      retries: 10
